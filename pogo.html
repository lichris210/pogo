<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POGO — Prompt Optimization & Generation Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    height: 100vh;
    background: #09090B;
    color: #FAFAFA;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- Animations --- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .fade-in {
    animation: fadeUp 0.4s ease forwards;
  }

  /* --- Layout shell --- */
  .app {
    max-width: 740px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    padding: 0 24px;
  }

  /* --- Header --- */
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 28px 0 20px;
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    flex-direction: column;
  }
  .brand-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #52525B;
    margin-bottom: 6px;
  }
  .brand-title {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1.2;
    color: #FAFAFA;
  }
  .start-over-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid #27272A;
    border-radius: 6px;
    color: #52525B;
    font-size: 11px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
    white-space: nowrap;
    margin-top: 4px;
  }
  .start-over-btn:hover { border-color: #52525B; color: #A1A1AA; }

  /* --- Model Tabs --- */
  .model-bar {
    display: flex;
    align-items: center;
    border-bottom: 1px solid #18181B;
    margin-bottom: 0;
    flex-shrink: 0;
  }
  .model-tabs {
    display: flex;
    gap: 24px;
  }
  .model-tab {
    padding: 10px 0;
    background: transparent;
    border: none;
    cursor: pointer;
    color: #52525B;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    position: relative;
    transition: color 0.3s ease;
  }
  .model-tab:hover { color: #A1A1AA; }
  .model-tab.active { color: #FAFAFA; }
  .model-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: #FAFAFA;
  }
  .model-bar.locked .model-tab { cursor: default; }
  .model-bar.locked .model-tab:not(.active) { color: #27272A; }
  .model-bar.locked .model-tab:not(.active):hover { color: #27272A; }
  .lock-badge {
    font-size: 10px;
    color: #3F3F46;
    margin-left: auto;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* --- Chat container --- */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 8px;
    min-height: 0;
  }
  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: #27272A; border-radius: 2px; }

  /* --- Welcome (shown before first message) --- */
  .welcome {
    padding: 40px 0 16px;
  }
  .welcome-title {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1.3;
    color: #FAFAFA;
    margin-bottom: 8px;
  }
  .welcome-sub {
    font-size: 14px;
    color: #52525B;
    line-height: 1.6;
    font-weight: 400;
    margin-bottom: 28px;
  }
  .examples-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .example-chip {
    padding: 10px 16px;
    background: transparent;
    border: 1px solid #1C1C1F;
    border-radius: 8px;
    color: #52525B;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
    line-height: 1.4;
  }
  .example-chip:hover {
    border-color: #3F3F46;
    color: #A1A1AA;
    transform: translateX(4px);
  }

  /* --- Messages --- */
  .message {
    display: flex;
    margin-bottom: 20px;
    animation: fadeUp 0.35s ease forwards;
  }
  .message.user { justify-content: flex-end; }
  .message.assistant { justify-content: flex-start; }

  .bubble {
    max-width: 90%;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
    word-break: break-word;
  }
  .bubble.user-bubble {
    background: #FAFAFA;
    color: #09090B;
    padding: 10px 16px;
    border-bottom-right-radius: 4px;
    font-weight: 400;
    white-space: pre-wrap;
  }
  .bubble.assistant-bubble {
    padding: 14px 18px;
    background: transparent;
    color: #D4D4D8;
    font-weight: 400;
  }

  /* --- Markdown inside assistant bubbles --- */
  .msg-text {
    margin-bottom: 8px;
  }
  .msg-text:last-child { margin-bottom: 0; }
  .msg-text strong { color: #FAFAFA; font-weight: 600; }
  .msg-text code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: #18181B;
    padding: 2px 5px;
    border-radius: 4px;
    color: #A1A1AA;
  }
  .msg-text hr {
    border: none;
    border-top: 1px solid #1C1C1F;
    margin: 14px 0;
  }
  .msg-text ul, .msg-text ol {
    margin: 6px 0 6px 20px;
    color: #A1A1AA;
  }
  .msg-text li { margin-bottom: 3px; }

  /* --- Draft card (code fences inside messages) --- */
  .draft-card {
    margin: 10px 0;
    border: 1px solid #1C1C1F;
    border-radius: 10px;
    background: #0C0C0E;
    overflow: hidden;
  }
  .draft-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid #1C1C1F;
  }
  .draft-label {
    font-size: 10px;
    font-weight: 500;
    color: #52525B;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .mini-copy-btn {
    padding: 3px 10px;
    background: transparent;
    border: 1px solid #27272A;
    border-radius: 5px;
    color: #52525B;
    font-size: 11px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .mini-copy-btn:hover { border-color: #52525B; color: #A1A1AA; }
  .draft-card pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.75;
    color: #A1A1AA;
    padding: 16px;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 360px;
    overflow-y: auto;
  }
  .draft-card pre::-webkit-scrollbar { width: 4px; }
  .draft-card pre::-webkit-scrollbar-track { background: transparent; }
  .draft-card pre::-webkit-scrollbar-thumb { background: #27272A; border-radius: 2px; }

  .render-block { margin-bottom: 10px; }
  .render-block:last-child { margin-bottom: 0; }

  .prompt-card {
    margin: 10px 0;
    overflow: hidden;
  }
  .prompt-card .draft-header,
  .prompt-card .final-header {
    gap: 12px;
  }
  .prompt-header-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .prompt-format-pill {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid #27272A;
    color: #71717A;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .prompt-card .mini-copy-btn { flex-shrink: 0; }
  .prompt-techniques {
    padding: 10px 16px 14px;
    border-top: 1px solid #1C1C1F;
    color: #A1A1AA;
    font-size: 12px;
    line-height: 1.6;
  }
  .prompt-tech-label {
    display: inline-block;
    margin-right: 6px;
    color: #FAFAFA;
    font-weight: 600;
  }
  .prompt-markdown-body {
    padding: 16px;
    background: #0C0C0E;
  }
  .prompt-markdown-body .msg-text {
    color: #D4D4D8;
    margin-bottom: 10px;
  }
  .prompt-markdown-body .msg-text:last-child { margin-bottom: 0; }
  .prompt-markdown-body .msg-text strong { color: #FAFAFA; }
  .prompt-markdown-body .msg-text code {
    background: #18181B;
    color: #E4E4E7;
  }
  .prompt-markdown-body .msg-text ul,
  .prompt-markdown-body .msg-text ol {
    color: #D4D4D8;
  }
  .prompt-markdown-body .md-heading {
    display: block;
    color: #FAFAFA;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .prompt-markdown-body .md-h1 { font-size: 18px; }
  .prompt-markdown-body .md-h2 { font-size: 16px; }
  .prompt-markdown-body .md-h3,
  .prompt-markdown-body .md-h4,
  .prompt-markdown-body .md-h5,
  .prompt-markdown-body .md-h6 { font-size: 14px; }
  .xml-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.75;
    color: #D4D4D8;
    padding: 16px;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 360px;
    overflow-y: auto;
  }
  .tok-punct { color: #71717A; }
  .tok-tag { color: #F59E0B; }
  .tok-attr { color: #38BDF8; }
  .tok-string { color: #86EFAC; }
  .tok-text { color: #D4D4D8; }

  .guardrail-banner {
    border-radius: 10px;
    border: 1px solid;
    padding: 12px 14px;
    margin: 10px 0;
    background: #0F0F12;
  }
  .guardrail-banner.warning {
    border-color: #713F12;
    background: rgba(120, 53, 15, 0.12);
  }
  .guardrail-banner.error {
    border-color: #7F1D1D;
    background: rgba(127, 29, 29, 0.16);
  }
  .guardrail-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .guardrail-banner.warning .guardrail-title { color: #FBBF24; }
  .guardrail-banner.error .guardrail-title { color: #F87171; }
  .guardrail-list {
    margin: 0 0 0 18px;
    color: #E4E4E7;
    font-size: 13px;
    line-height: 1.6;
  }
  .guardrail-list li + li { margin-top: 6px; }

  .info-card {
    margin: 10px 0;
    border: 1px solid #1C1C1F;
    border-radius: 10px;
    background: #0C0C0E;
    overflow: hidden;
  }
  .info-card-header {
    padding: 10px 14px;
    border-bottom: 1px solid #1C1C1F;
  }
  .info-card-title {
    font-size: 11px;
    font-weight: 600;
    color: #FAFAFA;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .context-list,
  .question-list,
  .suggestion-list {
    padding: 10px 14px 14px;
  }
  .context-item,
  .question-item,
  .suggestion-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid #18181B;
  }
  .context-item:last-child,
  .question-item:last-child,
  .suggestion-item:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }
  .context-item:first-child,
  .question-item:first-child,
  .suggestion-item:first-child { padding-top: 0; }
  .context-check {
    width: 18px;
    height: 18px;
    border-radius: 6px;
    border: 1px solid #3F3F46;
    background: #09090B;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .suggestion-marker {
    width: 24px;
    height: 24px;
    border-radius: 999px;
    background: #18181B;
    border: 1px solid #27272A;
    color: #A1A1AA;
    font-size: 11px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .question-number {
    width: 24px;
    height: 24px;
    border-radius: 999px;
    background: #18181B;
    border: 1px solid #27272A;
    color: #FAFAFA;
    font-size: 11px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .item-main {
    color: #FAFAFA;
    font-size: 13px;
    line-height: 1.6;
  }
  .item-detail {
    color: #A1A1AA;
    font-size: 12px;
    line-height: 1.55;
    margin-top: 4px;
  }

  .scorecard {
    margin: 10px 0;
    border: 1px solid #1C1C1F;
    border-radius: 10px;
    background: #0C0C0E;
    overflow: hidden;
  }
  .scorecard-body {
    padding: 10px 14px 14px;
  }
  .score-row {
    display: grid;
    grid-template-columns: minmax(120px, 170px) 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 8px 0;
  }
  .score-row + .score-row { border-top: 1px solid #18181B; }
  .score-label {
    color: #D4D4D8;
    font-size: 12px;
    line-height: 1.4;
  }
  .score-track {
    width: 100%;
    height: 8px;
    border-radius: 999px;
    background: #18181B;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #71717A 0%, #FAFAFA 100%);
  }
  .score-fill.tone-good {
    background: linear-gradient(90deg, #22C55E 0%, #86EFAC 100%);
  }
  .score-fill.tone-mid {
    background: linear-gradient(90deg, #F59E0B 0%, #FDE68A 100%);
  }
  .score-fill.tone-low {
    background: linear-gradient(90deg, #EF4444 0%, #FCA5A5 100%);
  }
  .score-value {
    color: #FAFAFA;
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }

  .sample-panel {
    margin: 10px 0;
    border: 1px solid #27272A;
    border-radius: 10px;
    background: #111114;
    overflow: hidden;
  }
  .sample-panel summary {
    list-style: none;
    cursor: pointer;
    padding: 12px 14px;
    color: #FAFAFA;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .sample-panel summary::-webkit-details-marker { display: none; }
  .sample-panel summary::after {
    content: 'Show';
    float: right;
    color: #71717A;
    font-size: 11px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }
  .sample-panel[open] summary::after { content: 'Hide'; }
  .sample-panel-body {
    padding: 0 14px 14px;
    border-top: 1px solid #1C1C1F;
  }
  .sample-panel pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: #D4D4D8;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    padding-top: 14px;
  }
  .sample-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding-top: 14px;
  }
  .sample-meta-chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 9px;
    border-radius: 999px;
    border: 1px solid #27272A;
    background: #0C0C0E;
    color: #A1A1AA;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* --- Final prompt card (accepted state) --- */
  .final-card {
    margin: 10px 0;
    border: 1px solid #3F3F46;
    border-radius: 12px;
    background: #0C0C0E;
    overflow: hidden;
  }
  .final-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid #27272A;
    background: #18181B;
  }
  .final-label {
    font-size: 11px;
    font-weight: 600;
    color: #FAFAFA;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .final-card pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.8;
    color: #FAFAFA;
    padding: 24px;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 480px;
    overflow-y: auto;
  }
  .final-card pre::-webkit-scrollbar { width: 4px; }
  .final-card pre::-webkit-scrollbar-track { background: transparent; }
  .final-card pre::-webkit-scrollbar-thumb { background: #3F3F46; border-radius: 2px; }

  /* --- Action buttons (inline after assistant message) --- */
  .action-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .action-btn {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid #27272A;
    border-radius: 100px;
    color: #D4D4D8;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .action-btn:hover { border-color: #52525B; background: #18181B; }
  .action-btn.primary {
    background: #FAFAFA;
    color: #09090B;
    border-color: #FAFAFA;
  }
  .action-btn.primary:hover { background: #E4E4E7; border-color: #E4E4E7; }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* --- Scores row --- */
  .scores-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 10px 0 4px;
  }
  .score-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    background: #18181B;
    border: 1px solid #27272A;
    color: #A1A1AA;
    letter-spacing: 0.02em;
  }
  .score-chip .score-val { color: #FAFAFA; font-weight: 600; }

  /* --- Typing indicator --- */
  .typing-row {
    display: flex;
    margin-bottom: 20px;
    animation: fadeUp 0.3s ease forwards;
  }
  .typing-dots {
    display: inline-flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }
  .typing-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #52525B;
    animation: pulse 1.2s ease infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* --- Error banner (inline) --- */
  .error-banner {
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #371520;
    color: #F87171;
    font-size: 13px;
    font-weight: 400;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease forwards;
  }

  /* --- Input bar --- */
  .input-bar {
    border-top: 1px solid #18181B;
    padding: 14px 0 20px;
    display: flex;
    align-items: flex-end;
    gap: 12px;
    flex-shrink: 0;
    background: #09090B;
  }
  .chat-input {
    flex: 1;
    padding: 8px 0;
    font-size: 15px;
    line-height: 1.5;
    background: transparent;
    border: none;
    color: #FAFAFA;
    resize: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    letter-spacing: -0.01em;
    max-height: 160px;
    overflow-y: auto;
  }
  .chat-input::placeholder { color: #3F3F46; }
  .chat-input::-webkit-scrollbar { width: 3px; }
  .chat-input::-webkit-scrollbar-track { background: transparent; }
  .chat-input::-webkit-scrollbar-thumb { background: #27272A; border-radius: 2px; }
  .send-btn {
    padding: 10px 22px;
    background: #FAFAFA;
    color: #09090B;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
    letter-spacing: -0.01em;
  }
  .send-btn:hover { background: #E4E4E7; transform: translateY(-1px); }
  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled {
    background: #27272A;
    color: #52525B;
    cursor: not-allowed;
    transform: none;
  }
  .input-hint {
    font-size: 11px;
    color: #3F3F46;
    align-self: center;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="app-header">
    <div class="brand">
      <p class="brand-label">pogo</p>
      <h1 class="brand-title">Craft the perfect prompt.</h1>
    </div>
    <button class="start-over-btn" id="startOverBtn">Start over</button>
  </div>

  <!-- Model tabs -->
  <div class="model-bar" id="modelBar">
    <div class="model-tabs" id="modelTabs">
      <button class="model-tab active" data-model="claude">Claude</button>
      <button class="model-tab" data-model="gpt">GPT</button>
      <button class="model-tab" data-model="gemini">Gemini</button>
    </div>
    <span class="lock-badge hidden" id="lockBadge">locked</span>
  </div>

  <!-- Chat area -->
  <div class="chat-container" id="chatContainer">

    <!-- Welcome (replaced by messages once conversation starts) -->
    <div id="welcome" class="welcome fade-in">
      <h2 class="welcome-title">What do you need a prompt for?</h2>
      <p class="welcome-sub">Describe your task and I'll draft an optimized prompt, tailored to your chosen model.</p>
      <div class="examples-grid" id="examplesGrid">
        <button class="example-chip">Analyze customer churn data and suggest retention strategies</button>
        <button class="example-chip">Build a multi-step reasoning agent for complex research</button>
        <button class="example-chip">Create a secure chatbot resistant to prompt injection</button>
        <button class="example-chip">Extract structured JSON from unstructured meeting notes</button>
      </div>
    </div>

  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea class="chat-input" id="chatInput" placeholder="Describe your task..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>Send</button>
  </div>

</div>

<script>
// -------------------------------------------------------------------------
// Config
// -------------------------------------------------------------------------
// YOUR_API_ID is substituted at deploy time by deploy.sh (sed replacement).
const API_URL = "https://YOUR_API_ID.execute-api.us-east-1.amazonaws.com/optimize";

const MODEL_LABELS = { claude: "Claude", gpt: "GPT", gemini: "Gemini" };
const SCORE_KEYS = [
  "clarity", "specificity", "completeness",
  "constraint_coverage", "hallucination_risk", "overall",
];

// -------------------------------------------------------------------------
// State
// -------------------------------------------------------------------------
let selectedModel = "claude";
let sessionId = null;
let currentState = null;
let currentDraft = "";
let isLoading = false;

// -------------------------------------------------------------------------
// Elements
// -------------------------------------------------------------------------
const chatContainer = document.getElementById("chatContainer");
const welcomeEl = document.getElementById("welcome");
const chatInput = document.getElementById("chatInput");
const sendBtn = document.getElementById("sendBtn");
const modelBar = document.getElementById("modelBar");
const modelTabs = document.getElementById("modelTabs");
const lockBadge = document.getElementById("lockBadge");
const startOverBtn = document.getElementById("startOverBtn");
const examplesGrid = document.getElementById("examplesGrid");

// -------------------------------------------------------------------------
// Model tabs
// -------------------------------------------------------------------------
modelTabs.addEventListener("click", (e) => {
  if (sessionId) return;
  const tab = e.target.closest(".model-tab");
  if (!tab) return;
  selectedModel = tab.dataset.model;
  document.querySelectorAll(".model-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
});

function lockModel() {
  modelBar.classList.add("locked");
  lockBadge.classList.remove("hidden");
}

function unlockModel() {
  modelBar.classList.remove("locked");
  lockBadge.classList.add("hidden");
}

// -------------------------------------------------------------------------
// Textarea auto-resize + send
// -------------------------------------------------------------------------
chatInput.addEventListener("input", () => {
  chatInput.style.height = "auto";
  chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + "px";
  sendBtn.disabled = !chatInput.value.trim() || isLoading;
});

chatInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    sendCurrentMessage();
  }
  if (e.key === "Enter" && !e.shiftKey && !e.metaKey && !e.ctrlKey) {
    e.preventDefault();
    sendCurrentMessage();
  }
});

sendBtn.addEventListener("click", sendCurrentMessage);

// -------------------------------------------------------------------------
// Example chips
// -------------------------------------------------------------------------
examplesGrid.addEventListener("click", (e) => {
  const chip = e.target.closest(".example-chip");
  if (!chip) return;
  chatInput.value = chip.textContent;
  chatInput.dispatchEvent(new Event("input"));
  chatInput.focus();
});

// -------------------------------------------------------------------------
// Start over
// -------------------------------------------------------------------------
startOverBtn.addEventListener("click", startOver);

function startOver() {
  sessionId = null;
  currentState = null;
  currentDraft = "";
  isLoading = false;

  unlockModel();

  chatContainer.innerHTML = "";
  chatContainer.appendChild(welcomeEl);
  welcomeEl.classList.remove("hidden");

  chatInput.value = "";
  chatInput.style.height = "auto";
  chatInput.disabled = false;
  sendBtn.disabled = true;
  chatInput.placeholder = "Describe your task...";
  chatInput.focus();
}

// -------------------------------------------------------------------------
// Scroll helper
// -------------------------------------------------------------------------
function scrollToBottom() {
  requestAnimationFrame(() => {
    chatContainer.scrollTop = chatContainer.scrollHeight;
  });
}

// -------------------------------------------------------------------------
// Typing indicator
// -------------------------------------------------------------------------
function showTyping() {
  const row = document.createElement("div");
  row.className = "typing-row";
  row.id = "typingIndicator";
  row.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  chatContainer.appendChild(row);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

// -------------------------------------------------------------------------
// Message rendering
// -------------------------------------------------------------------------
function addUserMessage(text) {
  welcomeEl.classList.add("hidden");
  const row = document.createElement("div");
  row.className = "message user fade-in";
  const bubble = document.createElement("div");
  bubble.className = "bubble user-bubble";
  bubble.textContent = text;
  row.appendChild(bubble);
  chatContainer.appendChild(row);
  scrollToBottom();
}

function addAssistantMessage(data) {
  const row = document.createElement("div");
  row.className = "message assistant fade-in";

  const bubble = document.createElement("div");
  bubble.className = "bubble assistant-bubble";

  const msgText = data.message || "";
  const state = data.state;
  const draft = data.prompt_draft;
  const renderBlocks = Array.isArray(data.render_blocks) ? data.render_blocks : [];

  if (renderBlocks.length > 0) {
    bubble.appendChild(renderTypedBlocks(renderBlocks));
  } else if (state === "accepted" && draft) {
    // Render text before the prompt fence (strip it from message)
    const textBefore = msgText.replace(/```[\s\S]*?```/g, "").trim();
    if (textBefore) {
      bubble.appendChild(renderMarkdown(textBefore));
    }
    bubble.appendChild(makeFinalCard(draft));
  } else {
    bubble.appendChild(renderMarkdown(msgText));
  }

  // Legacy score chips for older payloads without render blocks.
  if (renderBlocks.length === 0 && data.scores && typeof data.scores === "object") {
    const scores = data.scores;
    const hasScores = SCORE_KEYS.some(k => typeof scores[k] === "number" && scores[k] >= 0);
    if (hasScores) {
      const scoresRow = document.createElement("div");
      scoresRow.className = "scores-row";
      SCORE_KEYS.forEach(key => {
        const val = scores[key];
        if (typeof val !== "number" || val < 0) return;
        const label = key.replace(/_/g, " ");
        const chip = document.createElement("span");
        chip.className = "score-chip";
        chip.innerHTML = `${label} <span class="score-val">${val}</span>`;
        scoresRow.appendChild(chip);
      });
      bubble.appendChild(scoresRow);
    }
  }

  // Action buttons
  const actions = getActions(state, data);
  if (actions.length > 0) {
    const bar = document.createElement("div");
    bar.className = "action-bar";
    actions.forEach(a => {
      const btn = document.createElement("button");
      btn.className = "action-btn" + (a.primary ? " primary" : "");
      btn.textContent = a.label;
      btn.addEventListener("click", () => {
        bar.querySelectorAll(".action-btn").forEach(b => b.disabled = true);
        a.onClick();
      });
      bar.appendChild(btn);
    });
    bubble.appendChild(bar);
  }

  row.appendChild(bubble);
  chatContainer.appendChild(row);
  scrollToBottom();
}

function addErrorBanner(text) {
  const el = document.createElement("div");
  el.className = "error-banner";
  el.textContent = text;
  chatContainer.appendChild(el);
  scrollToBottom();
}

function renderTypedBlocks(blocks) {
  const frag = document.createDocumentFragment();
  blocks.forEach(block => {
    const el = renderTypedBlock(block);
    if (el) frag.appendChild(el);
  });
  return frag;
}

function renderTypedBlock(block) {
  if (!block || typeof block !== "object") return null;

  switch (block.type) {
    case "text":
      return renderTextBlock(block.text);
    case "prompt_draft":
      return renderPromptCard(block);
    case "final_prompt":
      return renderPromptCard(block);
    case "context_checklist":
      return renderChecklistBlock(block);
    case "clarifier_questions":
      return renderQuestionListBlock(block);
    case "fewshot_examples":
      return renderFewshotBlock(block);
    case "guardrail_banner":
      return renderGuardrailBanner(block);
    case "scorecard":
      return renderScorecardBlock(block);
    case "suggestions_list":
      return renderSuggestionListBlock(block);
    case "sample_input":
    case "sample_output":
      return renderSamplePanelBlock(block);
    default:
      return null;
  }
}

function renderTextBlock(text) {
  if (!text || !String(text).trim()) return null;
  const el = document.createElement("div");
  el.className = "render-block";
  el.appendChild(renderMarkdown(String(text)));
  return el;
}

function renderPromptCard(block) {
  const isFinal = block.type === "final_prompt";
  const format = block.format || "markdown";
  const promptText = block.prompt || "";

  const card = document.createElement("div");
  card.className = `${isFinal ? "final-card" : "draft-card"} prompt-card render-block ${format === "xml" ? "prompt-xml" : "prompt-markdown"}`;

  const header = document.createElement("div");
  header.className = isFinal ? "final-header" : "draft-header";

  const meta = document.createElement("div");
  meta.className = "prompt-header-meta";

  const label = document.createElement("span");
  label.className = isFinal ? "final-label" : "draft-label";
  label.textContent = block.title || (isFinal ? "Final Prompt" : "Prompt");

  const pill = document.createElement("span");
  pill.className = "prompt-format-pill";
  pill.textContent = format;

  meta.appendChild(label);
  meta.appendChild(pill);

  const copyBtn = document.createElement("button");
  copyBtn.className = "mini-copy-btn";
  copyBtn.textContent = "Copy";
  copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(promptText);
    copyBtn.textContent = "Copied";
    setTimeout(() => { copyBtn.textContent = "Copy"; }, 2000);
  });

  header.appendChild(meta);
  header.appendChild(copyBtn);
  card.appendChild(header);

  if (format === "xml") {
    const pre = document.createElement("pre");
    pre.className = "xml-code";
    pre.innerHTML = highlightXml(promptText);
    card.appendChild(pre);
  } else {
    const body = document.createElement("div");
    body.className = "prompt-markdown-body";
    body.appendChild(renderMarkdown(promptText));
    card.appendChild(body);
  }

  if (block.techniques_text) {
    const footer = document.createElement("div");
    footer.className = "prompt-techniques";
    footer.innerHTML = `<span class="prompt-tech-label">Techniques applied</span>${escapeHtml(block.techniques_text)}`;
    card.appendChild(footer);
  }

  return card;
}

function renderChecklistBlock(block) {
  const section = makeInfoCard(block.title || "Context to provide");
  const body = section.querySelector(".info-card-body");
  body.classList.add("context-list");

  (block.items || []).forEach(item => {
    const row = document.createElement("div");
    row.className = "context-item";

    const check = document.createElement("span");
    check.className = "context-check";

    const copy = document.createElement("div");
    const parts = splitItemParts(item);

    const main = document.createElement("div");
    main.className = "item-main";
    main.textContent = parts.main;
    copy.appendChild(main);

    if (parts.detail) {
      const detail = document.createElement("div");
      detail.className = "item-detail";
      detail.textContent = parts.detail;
      copy.appendChild(detail);
    }

    row.appendChild(check);
    row.appendChild(copy);
    body.appendChild(row);
  });

  return section;
}

function renderQuestionListBlock(block) {
  const section = makeInfoCard(block.title || "Questions");
  const body = section.querySelector(".info-card-body");
  body.classList.add("question-list");

  (block.items || []).forEach((item, index) => {
    const row = document.createElement("div");
    row.className = "question-item";

    const number = document.createElement("span");
    number.className = "question-number";
    number.textContent = index + 1;

    const copy = document.createElement("div");
    const parts = splitItemParts(item);

    const main = document.createElement("div");
    main.className = "item-main";
    main.textContent = parts.main;
    copy.appendChild(main);

    if (parts.detail) {
      const detail = document.createElement("div");
      detail.className = "item-detail";
      detail.textContent = parts.detail;
      copy.appendChild(detail);
    }

    row.appendChild(number);
    row.appendChild(copy);
    body.appendChild(row);
  });

  return section;
}

function renderSuggestionListBlock(block) {
  const section = makeInfoCard(block.title || "Specific improvements");
  const body = section.querySelector(".info-card-body");
  body.classList.add("suggestion-list");

  (block.items || []).forEach((item, index) => {
    const row = document.createElement("div");
    row.className = "suggestion-item";

    const marker = document.createElement("span");
    marker.className = "suggestion-marker";
    marker.textContent = index + 1;

    const copy = document.createElement("div");
    const main = document.createElement("div");
    main.className = "item-main";
    main.textContent = item;
    copy.appendChild(main);

    row.appendChild(marker);
    row.appendChild(copy);
    body.appendChild(row);
  });

  return section;
}

function renderFewshotBlock(block) {
  const section = makeInfoCard(block.title || "Few-shot examples");
  const body = section.querySelector(".info-card-body");
  body.classList.add("prompt-markdown-body");
  body.appendChild(renderMarkdown(block.text || ""));
  return section;
}

function renderGuardrailBanner(block) {
  const banner = document.createElement("div");
  const severity = block.severity === "error" ? "error" : "warning";
  banner.className = `guardrail-banner ${severity} render-block`;

  const title = document.createElement("div");
  title.className = "guardrail-title";
  title.textContent = severity === "error"
    ? "Guardrail errors"
    : "Guardrail warnings";

  const list = document.createElement("ul");
  list.className = "guardrail-list";
  (block.items || []).forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
  });

  banner.appendChild(title);
  banner.appendChild(list);
  return banner;
}

function renderScorecardBlock(block) {
  const card = document.createElement("div");
  card.className = "scorecard render-block";

  const header = document.createElement("div");
  header.className = "info-card-header";

  const title = document.createElement("div");
  title.className = "info-card-title";
  title.textContent = block.title || "Prompt Evaluation";

  header.appendChild(title);
  card.appendChild(header);

  const body = document.createElement("div");
  body.className = "scorecard-body";

  SCORE_KEYS.forEach(key => {
    const val = block.scores ? block.scores[key] : null;
    if (typeof val !== "number" || val < 0) return;

    const row = document.createElement("div");
    row.className = "score-row";

    const label = document.createElement("div");
    label.className = "score-label";
    label.textContent = key === "hallucination_risk"
      ? "Hallucination risk (lower is better)"
      : key.replace(/_/g, " ");

    const track = document.createElement("div");
    track.className = "score-track";

    const fill = document.createElement("div");
    fill.className = `score-fill ${getScoreTone(key, val)}`;
    fill.style.width = `${Math.max(0, Math.min(val, 10)) * 10}%`;
    track.appendChild(fill);

    const value = document.createElement("div");
    value.className = "score-value";
    value.textContent = `${val}/10`;

    row.appendChild(label);
    row.appendChild(track);
    row.appendChild(value);
    body.appendChild(row);
  });

  card.appendChild(body);
  return card;
}

function renderSamplePanelBlock(block) {
  const details = document.createElement("details");
  details.className = "sample-panel render-block";
  if (!block.collapsed_by_default) details.open = true;

  const summary = document.createElement("summary");
  summary.textContent = block.title || "Sample output";

  const body = document.createElement("div");
  body.className = "sample-panel-body";

  const pre = document.createElement("pre");
  pre.textContent = block.text || "";
  body.appendChild(pre);

  const meta = [];
  if (typeof block.latency_ms === "number") meta.push(`latency ${block.latency_ms} ms`);
  if (typeof block.tokens_used === "number") meta.push(`tokens ${block.tokens_used}`);
  if (meta.length > 0) {
    const metaRow = document.createElement("div");
    metaRow.className = "sample-meta";
    meta.forEach(value => {
      const chip = document.createElement("span");
      chip.className = "sample-meta-chip";
      chip.textContent = value;
      metaRow.appendChild(chip);
    });
    body.appendChild(metaRow);
  }

  details.appendChild(summary);
  details.appendChild(body);
  return details;
}

function makeInfoCard(title) {
  const card = document.createElement("div");
  card.className = "info-card render-block";

  const header = document.createElement("div");
  header.className = "info-card-header";

  const label = document.createElement("div");
  label.className = "info-card-title";
  label.textContent = title;
  header.appendChild(label);

  const body = document.createElement("div");
  body.className = "info-card-body";

  card.appendChild(header);
  card.appendChild(body);
  return card;
}

function splitItemParts(item) {
  const lines = String(item || "")
    .split(/\n+/)
    .map(line => line.trim())
    .filter(Boolean);

  let main = lines.shift() || "";
  let detail = lines.join(" ");

  if (!detail) {
    const whyMatch = main.match(/^(.*?)(?:\s+Why:\s+)(.+)$/i);
    if (whyMatch) {
      main = whyMatch[1].trim();
      detail = `Why: ${whyMatch[2].trim()}`;
    }
  }

  if (!detail) {
    const parenMatch = main.match(/^(.*?)(?:\s+\((.+)\))$/);
    if (parenMatch) {
      main = parenMatch[1].trim();
      detail = parenMatch[2].trim();
    }
  }

  return { main, detail };
}

function getScoreTone(key, value) {
  const normalized = key === "hallucination_risk" ? 10 - value : value;
  if (normalized >= 8) return "tone-good";
  if (normalized >= 5) return "tone-mid";
  return "tone-low";
}

// -------------------------------------------------------------------------
// Action buttons per state
// -------------------------------------------------------------------------
function getActions(state, data = {}) {
  const canRunManualTest = (
    (state === "review" || state === "iterating") &&
    data.live_testing_enabled === false &&
    !hasSampleOutput(data.sample_output)
  );

  if (state === "awaiting_context") {
    return [
      {
        label: "Looks good, evaluate it",
        primary: true,
        onClick: () => sendMessage("Looks good. Please evaluate the prompt as-is."),
      },
      {
        label: "I want to make changes",
        primary: false,
        onClick: () => {
          chatInput.placeholder = "Describe the changes you'd like...";
          chatInput.focus();
        },
      },
    ];
  }
  if (state === "review") {
    const actions = [
      {
        label: "Accept this prompt",
        primary: true,
        onClick: () => sendMessage("accept"),
      },
      {
        label: "Refine further",
        primary: false,
        onClick: () => {
          chatInput.placeholder = "What would you like to change?";
          chatInput.focus();
        },
      },
    ];
    if (canRunManualTest) {
      actions.splice(1, 0, {
        label: "Test this prompt",
        primary: false,
        onClick: () => sendMessage("Run a live test for this prompt.", { runLiveTest: true }),
      });
    }
    return actions;
  }
  if (state === "iterating") {
    const actions = [
      {
        label: "Accept this prompt",
        primary: true,
        onClick: () => sendMessage("accept"),
      },
      {
        label: "Refine further",
        primary: false,
        onClick: () => {
          chatInput.placeholder = "What would you like to change?";
          chatInput.focus();
        },
      },
    ];
    if (canRunManualTest) {
      actions.splice(1, 0, {
        label: "Test this prompt",
        primary: false,
        onClick: () => sendMessage("Run a live test for this prompt.", { runLiveTest: true }),
      });
    }
    return actions;
  }
  if (state === "accepted") {
    return [
      {
        label: "Copy to clipboard",
        primary: true,
        onClick: () => {
          navigator.clipboard.writeText(currentDraft);
          const btns = document.querySelectorAll(".action-btn.primary");
          const lastBtn = btns[btns.length - 1];
          if (lastBtn) {
            lastBtn.textContent = "Copied!";
            lastBtn.disabled = false;
            setTimeout(() => { lastBtn.textContent = "Copy to clipboard"; }, 2000);
          }
        },
      },
      {
        label: "Start over",
        primary: false,
        onClick: startOver,
      },
    ];
  }
  return [];
}

function hasSampleOutput(sampleOutput) {
  if (!sampleOutput) return false;
  if (typeof sampleOutput === "string") return sampleOutput.trim().length > 0;
  if (typeof sampleOutput === "object") return String(sampleOutput.output || "").trim().length > 0;
  return false;
}

// -------------------------------------------------------------------------
// Markdown-ish renderer (handles code fences, bold, hr, lists)
// -------------------------------------------------------------------------
function renderMarkdown(text) {
  const frag = document.createDocumentFragment();

  // Split on code fences: text / code / text / code ...
  const parts = text.split(/(```(?:\w*)\n[\s\S]*?```)/g);

  parts.forEach(part => {
    const fenceMatch = part.match(/^```(?:\w*)\n([\s\S]*?)```$/);
    if (fenceMatch) {
      frag.appendChild(makeDraftCard(fenceMatch[1].trim()));
    } else if (part.trim()) {
      const div = document.createElement("div");
      div.className = "msg-text";
      div.innerHTML = inlineMarkdown(part);
      frag.appendChild(div);
    }
  });

  return frag;
}

function inlineMarkdown(text) {
  let html = escapeHtml(text);

  // Horizontal rules
  html = html.replace(/^---$/gm, "<hr>");

  // Headings
  html = html.replace(/^(#{1,6})\s+(.+)$/gm, (_, hashes, value) => {
    const level = Math.min(hashes.length, 6);
    return `<span class="md-heading md-h${level}">${value}</span>`;
  });

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

  // Inline code
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");

  // Lines starting with "  - " as list items
  html = html.replace(/(?:^|\n)((?:\s{1,4}-\s+.+(?:\n|$))+)/g, (_, block) => {
    const items = block.trim().split(/\n/).map(line =>
      "<li>" + line.replace(/^\s*-\s+/, "") + "</li>"
    ).join("");
    return "<ul>" + items + "</ul>";
  });

  // Numbered list blocks
  html = html.replace(/(?:^|\n)((?:\s{0,4}\d+\.\s+.+(?:\n|$))+)/g, (_, block) => {
    const items = block.trim().split(/\n/).map(line =>
      "<li>" + line.replace(/^\s*\d+\.\s+/, "") + "</li>"
    ).join("");
    return "<ol>" + items + "</ol>";
  });

  // Newlines → <br> (but not inside tags we just created)
  html = html.replace(/\n/g, "<br>");

  // Clean up <br> adjacent to block elements
  html = html.replace(/<br>\s*(<(?:hr|ul|\/ul|li|\/li))/g, "$1");
  html = html.replace(/(<\/(?:ul|hr)>)\s*<br>/g, "$1");
  html = html.replace(/<br>\s*(<(?:ol|\/ol))/g, "$1");
  html = html.replace(/(<\/ol>)\s*<br>/g, "$1");

  return html;
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function highlightXml(text) {
  const escaped = escapeHtml(text);
  return escaped.replace(/(&lt;\/?)([A-Za-z_][\w:.-]*)([\s\S]*?)(\/?&gt;)/g, (_, open, tag, attrs, close) => {
    const highlightedAttrs = attrs.replace(
      /([A-Za-z_:][\w:.-]*)(=)(&quot;.*?&quot;)/g,
      '<span class="tok-attr">$1</span>$2<span class="tok-string">$3</span>'
    );
    return `<span class="tok-punct">${open}</span><span class="tok-tag">${tag}</span>${highlightedAttrs}<span class="tok-punct">${close}</span>`;
  });
}

// -------------------------------------------------------------------------
// Card builders
// -------------------------------------------------------------------------
function makeDraftCard(promptText) {
  const card = document.createElement("div");
  card.className = "draft-card";

  const header = document.createElement("div");
  header.className = "draft-header";
  header.innerHTML = '<span class="draft-label">Prompt</span>';

  const copyBtn = document.createElement("button");
  copyBtn.className = "mini-copy-btn";
  copyBtn.textContent = "Copy";
  copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(promptText);
    copyBtn.textContent = "Copied";
    setTimeout(() => { copyBtn.textContent = "Copy"; }, 2000);
  });
  header.appendChild(copyBtn);
  card.appendChild(header);

  const pre = document.createElement("pre");
  pre.textContent = promptText;
  card.appendChild(pre);

  return card;
}

function makeFinalCard(promptText) {
  const card = document.createElement("div");
  card.className = "final-card";

  const header = document.createElement("div");
  header.className = "final-header";
  header.innerHTML = '<span class="final-label">Final Prompt</span>';

  const copyBtn = document.createElement("button");
  copyBtn.className = "mini-copy-btn";
  copyBtn.textContent = "Copy";
  copyBtn.style.color = "#A1A1AA";
  copyBtn.style.borderColor = "#3F3F46";
  copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(promptText);
    copyBtn.textContent = "Copied";
    setTimeout(() => { copyBtn.textContent = "Copy"; }, 2000);
  });
  header.appendChild(copyBtn);
  card.appendChild(header);

  const pre = document.createElement("pre");
  pre.textContent = promptText;
  card.appendChild(pre);

  return card;
}

// -------------------------------------------------------------------------
// API communication
// -------------------------------------------------------------------------
function sendCurrentMessage() {
  const text = chatInput.value.trim();
  if (!text || isLoading) return;
  chatInput.value = "";
  chatInput.style.height = "auto";
  sendBtn.disabled = true;
  sendMessage(text);
}

async function sendMessage(text, options = {}) {
  if (isLoading) return;

  addUserMessage(text);
  isLoading = true;
  sendBtn.disabled = true;
  chatInput.disabled = true;

  // Lock model on first message
  if (!sessionId) lockModel();

  showTyping();

  try {
    const payload = {
      message: text,
      target_model: selectedModel,
    };
    if (options.runLiveTest === true) payload.run_live_test = true;
    if (sessionId) payload.session_id = sessionId;

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });

    hideTyping();

    const raw = await res.text();
    let data;
    try {
      data = JSON.parse(raw);
    } catch {
      addErrorBanner("Invalid response from server.");
      return;
    }

    // API Gateway wraps the response: the body field is JSON-encoded
    if (data.statusCode && data.body) {
      if (data.statusCode >= 400) {
        const err = JSON.parse(data.body);
        addErrorBanner(err.error || `Error ${data.statusCode}`);
        return;
      }
      data = JSON.parse(data.body);
    }

    if (data.error) {
      addErrorBanner(data.error);
      return;
    }

    // Persist session
    if (data.session_id) sessionId = data.session_id;
    if (data.state) currentState = data.state;
    if (data.prompt_draft) currentDraft = data.prompt_draft;

    addAssistantMessage(data);

    // If accepted, disable further input
    if (data.state === "accepted") {
      chatInput.disabled = true;
      chatInput.placeholder = "Session complete. Start over to begin a new prompt.";
      sendBtn.disabled = true;
    }

  } catch (e) {
    hideTyping();
    addErrorBanner("Could not reach POGO. Check your connection and try again.");
  } finally {
    isLoading = false;
    if (currentState !== "accepted") {
      chatInput.disabled = false;
      sendBtn.disabled = !chatInput.value.trim();
      chatInput.focus();
    }
  }
}

// -------------------------------------------------------------------------
// Init
// -------------------------------------------------------------------------
chatInput.focus();
